site_name: InowDocs — Panduan Produksi Inowtech
site_description: Dokumentasi stack, panduan setup, workflow & SOP, dan troubleshooting untuk tim produksi Inowtech.
site_author: Tim Produksi Inowtech
repo_name: inowdocs
repo_url: https://github.com/ahmadzaenimubarok/InowDocs
edit_uri: edit/main/docs/

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode Gelap
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode Terang
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Beranda: index.md

  - Global:
      - Onboarding: setup/onboarding.md
      - Stack Overview: stack/index.md
      - Database: stack/database.md
      - Cloudflare: stack/cloudflare.md
      - Cloudflare Tunnel: setup/cloudflare-tunnel.md
      - Troubleshooting: troubleshooting/common-errors.md

  - Git:
      - Git Flow: workflow/git-flow.md
      - Code Review SOP: workflow/code-review.md
      - Deployment SOP: workflow/deployment.md
      - Rollback & Incident: workflow/rollback.md

  - Laravel:
      - Stack Laravel: stack/laravel.md
      - Install Laravel: setup/install-laravel.md
      - Environments: workflow/environments.md
      - Testing: workflow/testing.md
